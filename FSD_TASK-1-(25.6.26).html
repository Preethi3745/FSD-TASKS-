<!DOCTYPE html>
<html>
<head>
    <title>Info Form</title>

    <style>
        body {
            font-family:  Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
            margin-top: 200px;
        }

        form {
            width: 300px;
            margin: auto;
            padding: 20px;
            background-color: beige;
            border: 2px solid purple;
            border-radius: 8px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #60092B;
            border-radius: 5px;
        }

        button {
            padding: 10px 15px;
            background-color: Coral;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: Teal;
        }
    </style>
</head>

<body>

    <form>
        <h2>Registration Form</h2>

        <input type="text" placeholder="Enter Name" required>

        <input type="email" placeholder="Enter Email" required>

        <button type="submit">Submit</button>
    </form>

</body>
</html>
