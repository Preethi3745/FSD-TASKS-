<!DOCTYPE html>
<html>
<head>
    <title>Event Listener</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
            background-color: cyan;
        }

        button {
            padding: 10px 15px;
            background-color: pink;
            color: black;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }

        button:hover {
            background-color: #9CF42A;
        }
    </style>
</head>

<body>

    <button id="mybutton">Click meeee</button>

    <script>
        document.getElementById("mybutton").addEventListener("click", function() {
            alert("Hey, the button is clicked");
        });
    </script>

</body>
</html>
